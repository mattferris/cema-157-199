- name: Lab 4 NGINX Certificate Request
  hosts: ubuntu-managed
  become: yes
  vars:
    domain_name: matt.example.org
    acme_account_email: matt@example.org
    acme_challenge_type: http-01
    certificate_dir: /etc/nginx/ssl
    acme_account_key: /etc/nginx/ssl/account.key
    acme_certificate_key: /etc/nginx/ssl/cert.key
    acme_certificate_csr: /etc/nginx/ssl/cert.csr
    acme_certificate_crt: /etc/nginx/ssl/cert.crt
    acme_certificate_chain: /etc/nginx/ssl/fullchain.crt
    acme_challenge_dir: /var/www/html
    acme_directory: https://acme.example.org/acme/acme/directory

  tasks:
    - name: Install required OS Packages from APT
      ansible.builtin.apt:
        pkg:
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present
        update_cache: true

    - name: Copy resolv.conf
      copy:
        src: /etc/ansible/resolv.conf
        dest: /etc/resolv.conf
        owner: root
        group: root

    - name: Create custom certificates directory
      file:
        path: /usr/local/share/ca-certificates
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Copy root certificate to host
      copy:
        src: /usr/local/share/ca-certificates/root_ca.crt
        dest: /usr/local/share/ca-certificates
        mode: '0644'
        owner: root
        group: root
      register: cert_copied

    - name: Copy intermediate certificate to host
      copy:
        src: /usr/local/share/ca-certificates/intermediate_ca.crt
        dest: /usr/local/share/ca-certificates
        mode: '0644'
        owner: root
        group: root


    - name: Update certificate authority store
      command: update-ca-certificates && systemct restart nginx
      when: cert_copied.changed

    - name: Copy nginx config
      ansible.builtin.copy:
        src: /etc/ansible/nginx_files/default
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: '0644'

    - name: copy webpage file
      ansible.builtin.copy:
        src: /etc/ansible/nginx_files/index.html
        dest: /var/www/html
        owner: root
        group: root
        mode: '0644'

    - name: Create SSL certificate directory
      file:
        path: "{{ certificate_dir }}"
        state: directory
        mode: '0700'
        owner: root
        group: root

    - name: Create ACME challenge directory
      file:
        path: "{{ acme_challenge_dir }}"
        state: directory
        mode: '0755'
        owner: www-data
        group: www-data


    - name: Generate ACME account private key
      openssl_privatekey:
        path: "{{ acme_account_key }}"
        size: 2048
        mode: '0600'
        type: RSA

    - name: Generate certificate private key
      openssl_privatekey:
        path: "{{ acme_certificate_key }}"
        size: 2048
        mode: '0600'
        type: RSA

    - name: Generate certificate signing request (CSR)
      openssl_csr:
        path: "{{ acme_certificate_csr }}"
        privatekey_path: "{{ acme_certificate_key }}"
        common_name: "{{ domain_name }}"
        subject_alt_name: "DNS:{{ domain_name }}"

    - name: Request ACME certificate challenge
      community.crypto.acme_certificate:
        account_key_src: "{{ acme_account_key }}"
        csr: "{{ acme_certificate_csr }}"
        cert: "{{ acme_certificate_crt }}"
        fullchain: "{{ acme_certificate_chain }}"
        acme_directory: "{{ acme_directory }}"
        terms_agreed: yes
        modify_account: 'false'
      register: acme_challenge

    - name: Create challenge directory
      ansible.builtin.file:
        path: /var/www/html/.well-known/acme-challenge
        state: directory
        mode: 0755

    - name: Copy http-01 challenge for {{ domain_name }}
      ansible.builtin.copy:
        dest: /var/www/html/{{ acme_challenge['challenge_data'][domain_name]['http-01']['resource'] }}
        content: "{{ acme_challenge['challenge_data'][domain_name]['http-01']['resource_value'] }}"

    - name: Wait for challenge validation
      ansible.builtin.pause:
        seconds: 5

    - name: debug challenge
      debug:
        msg: /var/www/html/{{ acme_challenge['challenge_data'][domain_name]['http-01']['resource'] }}
    - name: Validate ACME challenge
      community.crypto.acme_certificate:
        account_key_src: "{{ acme_account_key }}"
        csr: "{{ acme_certificate_csr }}"
        dest: "{{ acme_certificate_crt }}"
        fullchain_dest: "{{ acme_certificate_chain }}"
        modify_account: false
        acme_directory: "{{ acme_directory }} "
        data: "{{ acme_challenge }}"
      register: validate_cert
      when: acme_challenge.challenge_data is defined

    - name: Verify certificate was obtained
      stat:
        path: "{{ acme_certificate_crt }}"
      register: cert_stat

    - name: Display certificate info
      debug:
        msg: "Certificate successfully obtained: {{ acme_certificate_crt }}"
      when: cert_stat.stat.exists

    - name: Set certificate file permissions
      file:
        path: "{{ item }}"
        mode: '0644'
        owner: root
        group: root
      loop:
        - "{{ acme_certificate_crt }}"
        - "{{ acme_certificate_chain }}"
      when: cert_stat.stat.exists

    - name: Configure nginx to use certificate
      template:
        src: /etc/ansible/nginx_files/default.j2
        dest: /etc/nginx/sites-available/default
        mode: '0644'
      notify: reload nginx
      when: cert_stat.stat.exists

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link
      notify: reload nginx
      when: cert_stat.stat.exists

  handlers:
    - name: reload nginx
      service:
        name: nginx
        state: reloaded
